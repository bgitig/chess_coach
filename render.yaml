services:
  - type: web
    name: chess-tutor-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y stockfish && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STOCKFISH_PATH
        value: /usr/bin/stockfish
      - key: CORS_ORIGINS
        value: https://bgitig.github.io
